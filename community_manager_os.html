<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Community Manager OS</title><style>body{margin:0;font-family:Arial;background:#0f1115;color:#fff;display:flex}.sidebar{width:250px;background:#171a21;height:100vh;padding:20px;position:fixed}.main{margin-left:290px;padding:20px;width:100%}.nav{padding:12px;background:#1f2430;border-radius:10px;margin-bottom:10px;cursor:pointer}.view{display:none}.view.active{display:block}.card{background:#171a21;padding:20px;border-radius:14px;margin-bottom:16px}input,textarea,select{width:100%;padding:10px;margin-top:10px;border:none;border-radius:10px;background:#222836;color:#fff}button{padding:10px 14px;border:none;border-radius:10px;background:#5865f2;color:#fff;margin-top:10px;cursor:pointer}.output{background:#222836;padding:12px;border-radius:10px;margin-top:10px;white-space:pre-wrap}</style></head><body><div class='sidebar'><h2>Community OS</h2><div class='nav' onclick="show('dashboard')">Dashboard</div><div class='nav' onclick="show('events')">Event Generator</div><div class='nav' onclick="show('content')">Content Pipeline</div><div class='nav' onclick="show('kpi')">KPI Tracker</div><div class='nav' onclick="show('ops')">Operations Notes</div></div><div class='main'><div id='dashboard' class='view active'><div class='card'><h1>Dashboard</h1><p>Community Manager Workspace</p></div></div><div id='events' class='view'><div class='card'><h1>AI Event Generator</h1><input id='eventType' placeholder='Event Type'><textarea id='eventDesc' placeholder='Describe your event'></textarea><button onclick='genEvent()'>Generate</button><div id='eventOut' class='output'></div></div></div><div id='content' class='view'><div class='card'><h1>Content Pipeline</h1><select id='ctype'><option>Discord Announcement</option><option>Twitter/X Post</option><option>Poll</option></select><textarea id='cctx' placeholder='Context/topic'></textarea><button onclick='genContent()'>Generate</button><div id='contentOut' class='output'></div></div></div><div id='kpi' class='view'><div class='card'><h1>KPI Tracker</h1><input placeholder='Members'><input placeholder='Messages'><input placeholder='Engagement %'></div></div><div id='ops' class='view'><div class='card'><h1>Operations Notes</h1><input placeholder='Title'><textarea placeholder='Notes'></textarea></div></div></div><script>function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active')}function genEvent(){let t=document.getElementById('eventType').value;let d=document.getElementById('eventDesc').value;document.getElementById('eventOut').innerText='EVENT: '+t+'\n\n'+d+'\n\nAnnouncement:\n🔥 Upcoming event soon!'}function genContent(){let t=document.getElementById('ctype').value;let c=document.getElementById('cctx').value;document.getElementById('contentOut').innerText='TYPE: '+t+'\n\n🚀 '+c+'\n\nJoin now! #Web3'}</script></body></html>
